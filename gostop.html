<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>고스톱 & 코주부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--panel:#111;--border:#222;--gold:#c8a020;--green:#1a5c2a;--felt:#1a5c2a;--red:#8B1a1a;--text:#f0e8d0;--muted:#666}
body{font-family:'Noto Serif KR',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;transition:all .15s}
.btn-gold{background:var(--gold);color:#111}.btn-gold:hover{background:#ddb020}
.btn-green{background:#1a5c2a;color:#a8f0b8;border:1px solid #2d7a3a}.btn-green:hover{background:#227038}
.btn-red{background:var(--red);color:#ffdddd}.btn-red:hover{background:#a02222}
.btn-muted{background:#222;color:#aaa;border:1px solid #333}.btn-muted:hover{background:#333}

.screen{display:none;min-height:100vh;padding:20px;flex-direction:column;align-items:center}
.screen.active{display:flex}
.container{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:30px;box-shadow:0 20px 40px rgba(0,0,0,0.8)}
h2.title{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:25px;color:var(--gold);letter-spacing:-0.5px}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.8rem;color:var(--gold);margin-bottom:6px;font-weight:700}
input[type="text"]{width:100%;padding:12px;background:#1a1a1a;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:1rem}
input[type="text"]:focus{outline:none;border-color:var(--gold)}

.lobby-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:25px;background:#151515;padding:15px;border-radius:6px;border:1px solid var(--border)}
.stat-box{text-align:center}
.stat-box .lbl{font-size:.75rem;color:var(--muted);margin-bottom:4px}
.stat-box .val{font-size:1.1rem;font-weight:700;color:var(--gold)}

.room-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.room-list{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:#050505;margin-bottom:20px}
.room-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.room-item:hover{background:#151515}
.room-item .r-name{font-weight:700;color:var(--text);font-size:.92rem}
.room-item .r-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.room-empty{padding:40px;text-align:center;color:var(--muted);font-size:.85rem}

.game-header{width:100%;max-width:1100px;display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;background:var(--panel);padding:12px 20px;border-radius:8px;border:1px solid var(--border)}
.game-layout{width:100%;max-width:1100px;display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}

.table-area{background:var(--felt);border:4px solid #3e2723;border-radius:12px;padding:20px;position:relative;display:flex;flex-direction:column;justify-content:space-between;min-height:600px;box-shadow:inset 0 0 50px rgba(0,0,0,0.6)}

.mat-section{background:rgba(0,0,0,0.2);border-radius:8px;padding:10px;margin-bottom:10px;border:1px dashed rgba(255,255,255,0.1)}
.mat-lbl{font-size:.75rem;color:rgba(240,232,208,0.6);margin-bottom:6px;font-weight:700}
.card-row{display:flex;gap:6px;flex-wrap:wrap;min-height:75px;align-items:center}

.hw-card{width:46px;height:70px;background:#b71c1c;border:2px solid #fff;border-radius:4px;box-shadow:0 3px 6px rgba(0,0,0,0.4);cursor:pointer;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:4px;color:#fff;user-select:none;font-family:'Noto Sans KR',sans-serif}
.hw-card:hover{transform:translateY(-4px);box-shadow:0 6px 12px rgba(0,0,0,0.6)}
.hw-card .c-m{font-size:.75rem;font-weight:900;text-align:left}
.hw-card .c-t{font-size:.65rem;text-align:center;background:rgba(0,0,0,0.4);border-radius:2px;padding:1px 0}
.hw-card.selected{border-color:var(--gold);transform:translateY(-8px);box-shadow:0 0 10px var(--gold)}

.side-area{display:flex;flex-direction:column;gap:15px}
.panel-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;box-shadow:0 10px 20px rgba(0,0,0,0.5)}
.chat-msgs{height:200px;overflow-y:auto;background:#050505;border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:8px;font-size:.8rem}
.chat-msg{margin-bottom:4px;line-height:1.4}
.chat-msg .nick{color:var(--gold);font-weight:700;margin-right:5px}
.chat-form{display:flex;gap:4px}
.chat-form input{flex-grow:1;padding:6px;background:#222;border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:.82rem}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:999}
.modal.open{display:flex}
.modal-content{background:var(--panel);border:2px solid var(--border);border-radius:12px;padding:25px;width:100%;max-width:380px;text-align:center}
.modal-content .icon{font-size:3rem;margin-bottom:10px}
.modal-content h3{color:var(--gold);margin-bottom:8px}
.modal-content .delta{font-size:1.3rem;font-weight:700;margin-bottom:15px}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div style="margin-top:15vh" class="container">
    <h2 class="title">🎴 고스톱 & 코주부 온라인</h2>
    <div class="form-group">
      <label>화투꾼 닉네임</label>
      <input type="text" id="nickInp" placeholder="닉네임 입력..." maxlength="10">
    </div>
    <button class="btn btn-gold" style="width:100%;padding:12px" onclick="doLogin()">타짜 입장</button>
  </div>
</div>

<div id="lobbyScreen" class="screen">
  <div class="container" style="max-width:580px">
    <h2 class="title">대기실</h2>
    <div class="lobby-stats">
      <div class="stat-box"><div class="lbl">나의 별칭</div><div class="val" id="lobbyNick">-</div></div>
      <div class="stat-box"><div class="lbl">보유 자금</div><div class="val" id="lobbyChips">1,000</div></div>
    </div>
    <div class="room-list-header">
      <span style="font-weight:700">판돈방 목록</span>
      <button class="btn btn-muted" style="padding:4px 10px;font-size:.75rem" onclick="refreshLobby()">새로고침</button>
    </div>
    <div class="room-list" id="roomList"><div class="room-empty">개설된 판돈방이 없습니다.</div></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-muted" style="flex:1" onclick="joinOfflineRoom('kj')">코주부 연습</button>
      <button class="btn btn-gold" style="flex:1" onclick="openModal('createRoomModal')">방 개설하기</button>
    </div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="game-header">
    <div id="roomTitleTxt" style="font-weight:700">방 제목</div>
    <button class="btn btn-red" style="padding:5px 12px;font-size:.8rem" onclick="confirmLeaveGame()">기권/퇴장</button>
  </div>
  <div class="game-layout">
    <div class="table-area">
      <div class="mat-section">
        <div class="mat-lbl" id="oppLbl">상대방 진영</div>
        <div class="card-row" id="oppHandRow"></div>
      </div>
      <div class="mat-section" style="background:rgba(0,0,0,0.3);min-height:100px">
        <div class="mat-lbl">바닥패 (필드)</div>
        <div class="card-row" id="fieldRow"></div>
      </div>
      <div class="mat-section" style="background:rgba(200,160,32,0.05)">
        <div class="mat-lbl">내 손패 (<span id="turnBadge" style="color:var(--gold);display:none">내 차례!</span>)</div>
        <div class="card-row" id="myHandRow"></div>
      </div>
    </div>
    <div class="side-area">
      <div class="panel-box">
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-form">
          <input type="text" id="chatInp" onkeydown="if(event.key==='Enter')sendChat()">
          <button class="btn btn-gold" style="padding:4px 10px;font-size:.78rem" onclick="sendChat()">송신</button>
        </div>
      </div>
      <div class="panel-box" style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-green" id="startBtn" style="display:none;width:100%" onclick="requestStart()">판 시작하기</button>
        <button class="btn btn-gold" id="actionBtn" style="display:none;width:100%" onclick="playSelectedCard()">선택한 패 내기</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="createRoomModal">
  <div class="modal-content">
    <h3>새 판 개설</h3>
    <div class="form-group" style="text-align:left;margin-top:15px">
      <label>방 제목</label>
      <input type="text" id="roomNameInp" placeholder="한판 붙읍시다.">
    </div>
    <div style="display:flex;gap:8px;margin-top:20px">
      <button class="btn btn-muted" style="flex:1" onclick="closeModal('createRoomModal')">취소</button>
      <button class="btn btn-gold" style="flex:1" onclick="doCreateRoom()">개설</button>
    </div>
  </div>
</div>

<div class="modal" id="resultModal">
  <div class="modal-content">
    <div class="icon" id="resIcon">🎉</div>
    <h3 id="resTitle">승리</h3>
    <div class="delta" id="resDelta">+100칩</div>
    <div id="resDesc" style="font-size:.85rem;color:#aaa;margin-bottom:20px">합산 결과</div>
    <button class="btn btn-gold" style="width:100%" onclick="playAgain()">확인</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDlaUjwZgPJ7Banlo56yFnfzafKJ1OEvWo",
  authDomain: "card-game-6b12d.firebaseapp.com",
  databaseURL: "https://card-game-6b12d-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "card-game-6b12d",
  storageBucket: "card-game-6b12d.firebasestorage.app",
  messagingSenderId: "33565494714",
  appId: "1:33565494714:web:dcbf56929bf44677fd6183"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
} else {
  firebase.app();
}

const db = firebase.database();
let offline = false;

// ═══════════════════ 고스톱/코주부 전용 상태 엔진 ═══════════════════
let myUid='',myNick='',myChips=1000;
let currentRoomId=null,roomRef=null,roomData=null;
let gsStarted=false,kjStarted=false;
let GS={selected:-1};

function $(id){return document.getElementById(id);}
function openModal(id){$(id).classList.add('open');}
function closeModal(id){$(id).classList.remove('open');}
function show(id){['loginScreen','lobbyScreen','gameScreen'].forEach(s=>$(s).classList.remove('active'));$(id).classList.add('active');}

window.onload=function(){
  let localUid=localStorage.getItem('gs_uid');if(!localUid){localUid='u_'+Math.random().toString(36).substring(2,11);localStorage.setItem('gs_uid',localUid);}
  myUid=localUid;
  let localNick=localStorage.getItem('gs_nick');if(localNick)$('nickInp').value=localNick;
  let localChips=localStorage.getItem('gs_chips');if(localChips){myChips=parseInt(localChips);}else{localStorage.setItem('gs_chips',myChips);}
};

function doLogin(){
  const n=$('nickInp').value.trim();if(!n){alert('화투 별칭을 입력하십시오.');return;}
  myNick=n;localStorage.setItem('gs_nick',myNick);
  $('lobbyNick').textContent=myNick;
  updateLobbyStats();
  show('lobbyScreen');
  listenRooms();
}
function updateLobbyStats(){$('lobbyChips').textContent=myChips.toLocaleString();localStorage.setItem('gs_chips',myChips);}

function listenRooms(){
  if(offline)return;
  db.ref('gostop_rooms').on('value',snap=>{
    const listEl=$('roomList');listEl.innerHTML='';
    const rooms=snap.val();
    if(!rooms){listEl.innerHTML='<div class="room-empty">개설된 판돈방이 없습니다.</div>';return;}
    let cnt=0;
    for(let rId in rooms){
      const r=rooms[rId];if(r.status==='finished')continue;
      cnt++;
      const item=document.createElement('div');item.className='room-item';
      item.innerHTML=`<div class="info"><div class="r-name">${r.name}</div><div class="r-meta">방장: ${r.p1Nick}</div></div><span class="btn btn-gold" style="padding:4px 8px;font-size:.75rem">입장</span>`;
      item.onclick=()=>joinRoom(rId);
      listEl.appendChild(item);
    }
    if(cnt===0)listEl.innerHTML='<div class="room-empty">개설된 판돈방이 없습니다.</div>';
  });
}
function refreshLobby(){if(!offline)listenRooms();}

function doCreateRoom(){
  let rName=$('roomNameInp').value.trim();if(!rName)rName=myNick+'님의 타짜방';
  closeModal('createRoomModal');
  const newRoomId='r_'+Date.now();currentRoomId=newRoomId;roomRef=db.ref('gostop_rooms/'+newRoomId);
  roomRef.set({id:newRoomId,name:rName,status:'waiting',p1Uid:myUid,p1Nick:myNick,p2Uid:'',p2Nick:'',turn:'',field:[],p1Hand:[],p2Hand:[]}).then(()=>{watchRoom();});
}

function joinRoom(rId){
  currentRoomId=rId;roomRef=db.ref('gostop_rooms/'+rId);
  roomRef.once('value',snap=>{
    const r=snap.val();if(!r)return;
    if(r.p1Uid===myUid){watchRoom();return;}
    if(r.p2Uid && r.p2Uid!==myUid){alert('인원이 초과되었습니다.');return;}
    roomRef.update({p2Uid:myUid,p2Nick:myNick}).then(()=>{watchRoom();});
  });
}

function watchRoom(){
  show('gameScreen');$('chatMsgs').innerHTML='';
  roomRef.on('value',snap=>{
    const data=snap.val();if(!data){goLobby();return;}
    roomData=data;$('roomTitleTxt').textContent=data.name;
    const isP1=data.p1Uid===myUid;
    $('oppLbl').textContent=isP1?(data.p2Nick||'상대 대기중'):data.p1Nick;
    if(data.status==='waiting'){
      $('startBtn').style.display=isP1&&data.p2Uid?'block':'none';
      $('actionBtn').style.display='none';
    }else if(data.status==='playing'){
      $('startBtn').style.display='none';
      const myHand=isP1?data.p1Hand:data.p2Hand;
      const oppHand=isP1?data.p2Hand:data.p1Hand;
      renderHand('myHandRow',myHand,true);
      renderHand('oppHandRow',oppHand,false);
      renderField(data.field);
      if(data.turn===myUid){$('turnBadge').style.display='inline';$('actionBtn').style.display='block';}
      else{$('turnBadge').style.display='none';$('actionBtn').style.display='none';}
    }else if(data.status==='finished'){
      const won=data.winner===myNick;myChips+=won?50:-50;updateLobbyStats();
      showResult(won,data.winner,won?50:-50,data.hand||'');
      roomRef.off();if(isP1)roomRef.remove();
    }
    if(data.chat){$('chatMsgs').innerHTML='';for(let k in data.chat){appendChat('chatMsgs',data.chat[k].nick,data.chat[k].text);}}
  });
}

function renderHand(elId,hand,isMine){
  const row=$(elId);row.innerHTML='';if(!hand)return;
  hand.forEach((c,idx)=>{
    const el=document.createElement('div');el.className='hw-card';
    if(isMine){
      el.innerHTML=`<div class="c-m">${c.m}월</div><div class="c-t">${c.t}</div>`;
      if(GS.selected===idx)el.classList.add('selected');
      el.onclick=()=>{GS.selected=idx;renderHand(elId,hand,true);};
    }else{el.style.background='#333';el.innerHTML='<div style="text-align:center;margin-top:20px;font-size:.6rem">화투</div>';}
    row.appendChild(el);
  });
}

function renderField(field){
  const row=$('fieldRow');row.innerHTML='';if(!field)return;
  field.forEach(c=>{
    const el=document.createElement('div');el.className='hw-card';
    el.innerHTML=`<div class="c-m">${c.m}월</div><div class="c-t">${c.t}</div>`;
    row.appendChild(el);
  });
}

function requestStart(){
  let deck=[];
  for(let m=1;m<=12;m++){['피','피','홍단','광'].forEach(t=>{deck.push({m:m,t:t});});}
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  let p1H=[],p2H=[],f=[];
  for(let i=0;i<10;i++)p1H.push(deck.pop());
  for(let i=0;i<10;i++)p2H.push(deck.pop());
  for(let i=0;i<8;i++)f.push(deck.pop());
  roomRef.update({status:'playing',p1Hand:p1H,p2Hand:p2H,field:f,turn:roomData.p1Uid,deck:deck});
}

function playSelectedCard(){
  if(roomData.turn!==myUid||GS.selected===-1)return;
  const isP1=roomData.p1Uid===myUid;
  let myHand=isP1?Object.values(roomData.p1Hand):Object.values(roomData.p2Hand);
  const card=myHand.splice(GS.selected,1)[0];
  let field=roomData.field?Object.values(roomData.field):[];
  field.push(card);
  let nextTurn=isP1?roomData.p2Uid:roomData.p1Uid;
  let updates={field:field,turn:nextTurn,drawnThisTurn:false};
  updates[isP1?'p1Hand':'p2Hand']=myHand;
  if(myHand.length===0){updates.status='finished';updates.winner=myNick;updates.hand='연습 경기 종료';}
  GS.selected=-1;roomRef.update(updates);
}

function sendChat(){const inp=$('chatInp');if(!inp.value.trim())return;if(roomRef)roomRef.child('chat').push({nick:myNick,text:inp.value.trim()});inp.value='';}
function appendChat(elId,nick,text){const el=$(elId);const d=document.createElement('div');d.className='chat-msg';d.innerHTML=`<span class="nick">${nick}:</span><span>${text}</span>`;el.appendChild(d);el.scrollTop=el.scrollHeight;}
function showResult(won,winner,delta,hand=''){ $('resIcon').textContent=won?'🎉':'😢';$('resTitle').textContent=won?'승리':'패배';$('resDelta').textContent=`${delta>=0?'+':''}${delta}칩`;$('resDesc').textContent=`${winner}님 승리 | ${hand}`;$('resultModal').classList.add('open'); }
function playAgain(){closeModal('resultModal');if(roomRef)requestStart();}
function goLobby(){if(roomRef){roomRef.off();roomRef=null;}show('lobbyScreen');if(!offline)listenRooms();}
function confirmLeaveGame(){if(confirm('진행 중인 판을 포기하시겠습니까?'))goLobby();}

function joinOfflineRoom(mode){
  offline=true;show('gameScreen');$('roomTitleTxt').textContent='인공지능 연습판';$('oppLbl').textContent='컴퓨터';
  renderField([{m:1,t:'광'},{m:3,t:'홍단'}]);renderHand('myHandRow',[{m:1,t:'피'},{m:5,t:'피'}],true);$('turnBadge').style.display='inline';$('actionBtn').style.display='block';
}
</script>
</body>
</html>
